name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ develop, master ]

env:
  HUSKY: 0

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release Zametek.ProjectPlan.slnf

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal Zametek.ProjectPlan.slnf
